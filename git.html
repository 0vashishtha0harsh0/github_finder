<!DOCTYPE html>
<html>
<head>
<title>GitHub Finder</title>
<style>
body{
background : #1a1a2e;
display: flex;
justify-content: center;
flex-direction: column;
align-items: center;
padding-top: 60px;
min-height: 100vh;font-family: Arial;
}
.search{
background : #1a1a2e;
padding : 10px;
width : 12px;
}
.input-row {
	    width: 400px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #6366f1;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
            outline: none;
        }
.result{
display: flex:
gap: 20px;
margin-top : 10px;
margin-bottom: 20px
}

.finder{
background : #16213e;
padding : 24px;
width : 28px;
}
.display {
            background: #0f3460;
            color: white;
            font-size: 32px;
            text-align: right;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            min-height: 60px;
            word-break: break-all;
        }


.buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

button {
    padding: 12px 20px;    
    font-size: 14px;       
    background: #6366f1;  
    color: white;       
}



button:hover {
            opacity: 0.8;
        }
</style>
</head>
<body>


<div class = "input-row">
<input
	type = "text"
	id= "gitInput"
	placeholder = "write or paste the GitHub id";
/>
<button onclick="Searchgit()">Search</button>
</div>
<div id="result"></div>

<script>
let web;

let gitInput = document.getElementById("gitInput")



function Searchgit(){
fetch('https://api.github.com/users/' + gitInput.value)
    .then(function(response) {
return response.json()
})
.then(function(data) {
let result = document.getElementById('result')

result.innerHTML = `
    <div style="
        margin-top: 24px;
        background: linear-gradient(135deg, #16213e, #0f3460);
        padding: 28px;
        border-radius: 16px;
        color: white;
        text-align: center;
        border: 1px solid #6366f1;
        max-width: 340px;
        box-shadow: 0 0 30px rgba(99,102,241,0.2);
    ">
        <img src="${data.avatar_url}" 
             style="
                width: 90px; 
                height: 90px; 
                border-radius: 50%; 
                border: 3px solid #6366f1;
                margin-bottom: 14px;
             "/>
        
        <h2 style="margin:0; color:#fff; font-size:20px">${data.name}</h2>
        <p style="color:#6366f1; font-size:13px; margin:4px 0">@${data.login}</p>
        <p style="color:#94a3b8; font-size:13px; margin:12px 0; line-height:1.5">
            ${data.bio || 'No bio available'}
        </p>

        <div style="
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
        ">
            <div style="background:#0d0d1a; padding:10px 20px; border-radius:10px;">
                <div style="font-size:20px; font-weight:bold; color:#10b981">
                    ${data.followers}
                </div>
                <div style="font-size:11px; color:#94a3b8; margin-top:2px">Followers</div>
            </div>
            <div style="background:#0d0d1a; padding:10px 20px; border-radius:10px;">
                <div style="font-size:20px; font-weight:bold; color:#6366f1">
                    ${data.public_repos}
                </div>
                <div style="font-size:11px; color:#94a3b8; margin-top:2px">Repos</div>
            </div>
            <div style="background:#0d0d1a; padding:10px 20px; border-radius:10px;">
                <div style="font-size:20px; font-weight:bold; color:#f59e0b">
                    ${data.following}
                </div>
                <div style="font-size:11px; color:#94a3b8; margin-top:2px">Following</div>
            </div>
        </div>

        <a href="${data.html_url}" target="_blank" style="
            display: inline-block;
            margin-top: 16px;
            padding: 8px 20px;
            background: #6366f1;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        ">View Profile →</a>
    </div>
`
})
}


</script>
</body>
</html>
